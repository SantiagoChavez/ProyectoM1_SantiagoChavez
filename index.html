<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorfly - Rueda Cromática</title>
    <link rel="stylesheet" href="Desarrollo/styles.css">
</head>

<body>
    <div class="app-container">
        <aside class="panel-controles">
            <div class="brand">
                <h1><span class="color-text">Color</span><span class="fly-text">fly</span> Studio</h1>
                <p>Generador de Paletas</p>
            </div>

            <div class="configuracion-grupo">
                <div class="control-grupo">
                    <label for="cantidad">Cantidad de colores:</label>
                    <select id="cantidad">
                        <option value="6">6 Colores</option>
                        <option value="8">8 Colores</option>
                        <option value="9">9 Colores</option>
                        <option value="12">12 Colores (Demo - Solo vista)</option>
                    </select>
                </div>

                <div class="control-grupo">
                    <label for="brillo">Tono de la paleta:</label>
                    <select id="brillo">
                        <option value="85">Pastel (Claro)</option>
                        <option value="50" selected>Vibrante (Medio)</option>
                        <option value="30">Oscuro (Bajo)</option>
                    </select>
                </div>

                <div class="control-grupo">
                    <label for="formato">Formato para copiar:</label>
                    <select id="formato">
                        <option value="HEX" selected>HEX</option>
                        <option value="HSL">HSL</option>
                    </select>
                </div>

                <div class="resumen-config">
                    <h3>Tu configuración:</h3>
                    <p id="resumen-texto">Cargando...</p>
                </div>

                <div class="acciones">
                    <button id="btn-generar">Generar Paleta</button>
                    <button id="btn-limpiar">Limpiar</button>
                </div>
            </div>
        </aside>

        <main class="escenario">
            <div id="rueda-container">
                <div class="centro-info">
                    <span>Click sobre el color para copiar</span>
                </div>
                <div id="toast"></div> 
            </div>
        </main>
    </div>

    <script src="Desarrollo/script.js"></script>
</body>

</html>
